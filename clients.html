<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - Vugru Dashboard</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="project-management.css" />
</head>
<body>
    <div class="page">

    <!-- SVG sprite (icons) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <symbol id="ico-target" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="6" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="2" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="1.5"/>
            <path d="M16 2v4M8 2v4M3 10h18" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-video" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="9" stroke-width="1.5"/>
            <path d="M12 7v5l3 2" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="6 9 12 15 18 9" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-users" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-width="1.5"/>
            <circle cx="9" cy="7" r="4" stroke-width="1.5"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="1.5"/>
        </symbol>
        <symbol id="ico-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="1.5"/>
        </symbol>
    </svg>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">V</div>
            <div>
                <div class="brand-title">VuGru</div>
                <div class="brand-sub">Real estate video production</div>
            </div>
        </div>
        <nav class="nav">
            <a href="project-management.html" class="nav-item"><svg class="ico"><use href="#ico-target"/></svg>Project Overview</a>
            <a href="calendar.html" class="nav-item"><svg class="ico"><use href="#ico-calendar"/></svg>Calendar</a>
            <a href="clients.html" class="nav-item active"><svg class="ico"><use href="#ico-users"/></svg>Clients</a>
            <a href="Vugru HTML.html" class="nav-item highlight"><svg class="ico"><use href="#ico-video"/></svg>Video Dashboard</a>
        </nav>
        <div class="foot">
            <button id="pm-logout-button" class="icon-btn bordered" style="width: 100%; margin-top: 1rem; justify-content: center; gap: 0.5rem;" title="Logout">
                <svg class="ico"><use href="#ico-logout"/></svg>
                <span>Logout</span>
            </button>
            <p style="margin-top: 1rem; text-align: center;">© VuGru — Real estate video specialists</p>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <h1 class="page-title">Clients</h1>

        <!-- Client Directory -->
        <section id="clients-directory" class="panel">
            <div class="panel-head">
                <h2 class="panel-title"><svg class="ico"><use href="#ico-users"/></svg>Client Directory</h2>
                <div class="sort-controls">
                    <input type="text" id="client-search" placeholder="Search clients..." class="search-input" style="padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: var(--fs-base);">
                </div>
            </div>
            <p class="muted small">Manage your client relationships and view all client information in one place.</p>

            <div id="clients-list" class="projects-grid">
                <!-- Clients will be dynamically inserted here by JavaScript -->
            </div>
        </section>

    </main>
    </div>

    <script src="clients.js"></script>
</body>
</html>
